<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>喜羊羊与灰太狼 - 大逃亡</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="game-wrapper" id="app">
    <div class="header">
        <div>🐑 喜羊羊与灰太狼</div>
        <div class="level-info">
            <span id="levelDisplay">第 1 关</span>
            <button class="level-btn" id="prevLevelBtn">◀</button>
            <button class="level-btn" id="nextLevelBtn">▶</button>
        </div>
    </div>

    <div class="grid-container" id="gridContainer"></div>

    <div class="status-bar">
        <div>🐑 剩余: <span id="sheepCount">0</span></div>
        <div class="goal">🎯 <span id="goalDisplay">0</span></div>
        <div>🐺 狼: <span id="wolfCount">0</span></div>
        <button class="reset-btn" id="resetBtn">↺ 重玩</button>
    </div>
    <div class="message" id="messageDisplay">🐑 滑动屏幕移动角色</div>
</div>
<div class="game-modal hidden" id="gameModal">
    <div class="game-modal-panel">
        <div class="game-modal-title" id="modalTitle">游戏结束</div>
        <div class="game-modal-message" id="modalMessage">点击重玩再试一次</div>
        <button class="reset-btn" id="modalResetBtn">↺ 重玩</button>
    </div>
</div>
<script src="js/levels.js"></script>
<script src="js/game.js"></script>

</body>
</html>
